<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción | La Ruta Garage</title>
    <link rel="icon" type="image/png" href="https://firebasestorage.googleapis.com/v0/b/d-clan-athletes.firebasestorage.app/o/La%20Ruta%20Garage%2FFavicon.png?alt=media&token=0e2d4383-2c9b-4005-9b46-943b40c0637d">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon: #d8ff5e; --bg: #0a0a0a; --card: rgba(20, 20, 20, 0.7); }
        body { 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://firebasestorage.googleapis.com/v0/b/d-clan-athletes.firebasestorage.app/o/La%20Ruta%20Garage%2FbglarutawebsiteBlack.jpg?alt=media&token=8e8d0ddb-b8a4-43f0-8199-98d31beaf078'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            color: white; font-family: 'Montserrat', sans-serif; margin: 0; padding: 20px; min-height: 100vh;
        }
        .header-registro { text-align: center; margin-bottom: 40px; }
        .header-registro img { width: 150px; margin-bottom: 15px; }
        .header-registro h1 { font-weight: 800; color: var(--neon); font-size: 1.6rem; text-transform: uppercase; margin: 0; }
        .form-container { max-width: 700px; margin: 0 auto; background: var(--card); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(216, 255, 94, 0.15); border-radius: 20px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        h2 { font-weight: 800; color: var(--neon); text-align: center; margin-bottom: 30px; font-size: 1.2rem; text-transform: uppercase; border-bottom: 1px solid rgba(216, 255, 94, 0.2); padding-bottom: 10px; }
        .section-label { color: var(--neon); font-size: 0.8rem; font-weight: 600; text-transform: uppercase; margin: 25px 0 15px; display: flex; align-items: center; gap: 10px; }
        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }
        .input-group { position: relative; }
        .input-group i { position: absolute; left: 12px; top: 35px; color: #555; font-size: 0.9rem; }
        label { display: block; font-size: 0.65rem; color: #aaa; text-transform: uppercase; margin-bottom: 5px; font-weight: 600; }
        input, select { width: 100%; padding: 10px 10px 10px 35px; background: rgba(0,0,0,0.4); border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; font-family: 'Montserrat'; font-size: 0.85rem; }
        input:focus { border-color: var(--neon); outline: none; }
        
        /* Estilo para el producto Short */
        .short-card { background: rgba(216, 255, 94, 0.05); border: 1px solid rgba(216, 255, 94, 0.2); border-radius: 12px; padding: 15px; display: flex; align-items: center; gap: 15px; margin-top: 10px; }
        .short-card img { width: 70px; border-radius: 8px; }
        .short-info p { margin: 0; font-size: 0.7rem; color: #ccc; }
        .short-info strong { color: var(--neon); font-size: 0.85rem; }
        
        .pago-box { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 12px; margin-top: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .price-tag { font-weight: 800; font-size: 1.4rem; color: #fff; display: block; }
        .btn-submit { width: 100%; padding: 18px; background: var(--neon); color: black; border: none; font-weight: 800; font-family: 'Montserrat'; font-size: 1rem; cursor: pointer; margin-top: 30px; border-radius: 10px; text-transform: uppercase; }
        @media (max-width: 600px) { .grid-form { grid-template-columns: 1fr; } .full-width { grid-column: span 1; } }
    </style>
</head>
<body>

<div class="header-registro">
    <img src="https://firebasestorage.googleapis.com/v0/b/d-clan-athletes.firebasestorage.app/o/La%20Ruta%20Garage%2FLogo%20Icono%20Verde.png?alt=media&token=07ce2638-9667-4bad-8de1-c38abc5112f8">
    <h1>Inscripción 2026</h1>
</div>

<div class="form-container">
    <h2>Registro de Atleta</h2>
    <form id="registroForm">
        <span class="section-label"><i class="fas fa-user"></i> 1. Datos Personales</span>
        <div class="grid-form">
            <div class="input-group"><label>Nombre</label><i class="fas fa-user"></i><input type="text" id="nombre" required></div>
            <div class="input-group"><label>Apellido</label><i class="fas fa-user-tag"></i><input type="text" id="apellido" required></div>
            <div class="input-group"><label>Cédula</label><i class="fas fa-id-card"></i><input type="number" id="cedula" required></div>
            <div class="input-group"><label>Fecha Nacimiento</label><i class="fas fa-calendar"></i><input type="date" id="fechaNac" required></div>
            <div class="input-group"><label>Sexo</label><i class="fas fa-venus-mars"></i><select id="sexo"><option value="Masculino">Masculino</option><option value="Femenino">Femenino</option></select></div>
            <div class="input-group"><label>WhatsApp</label><i class="fab fa-whatsapp"></i><input type="tel" id="telefono" placeholder="04121234567" required></div>
            <div class="full-width input-group"><label>Correo</label><i class="fas fa-envelope"></i><input type="email" id="correo" required></div>
            <div class="input-group"><label>Talla Franela</label><i class="fas fa-shirt"></i><select id="talla" required><option value="S">S</option><option value="M">M</option><option value="L">L</option><option value="XL">XL</option></select></div>
            <div class="input-group"><label>Box / Gym</label><i class="fas fa-dumbbell"></i><input type="text" id="box"></div>
        </div>

        <span class="section-label"><i class="fas fa-trophy"></i> 2. Modalidad</span>
        <div class="grid-form">
            <div class="input-group"><label>Modalidad</label><i class="fas fa-running"></i><select id="modalidad" onchange="actualizarPrecio()"><option value="Ruta Race">Ruta Race ($25)</option><option value="Ruta CrossFit">Ruta CrossFit ($30)</option></select></div>
            <div class="input-group"><label>Categoría</label><i class="fas fa-medal"></i><select id="categoria"></select></div>
        </div>

        <span class="section-label"><i class="fas fa-shopping-bag"></i> 3. Complemento (Opcional)</span>
        <div class="short-card">
            <img src="https://i.ibb.co/FqHK7c5s/Short-Referencial.png" alt="Short">
            <div class="short-info">
                <strong>Short Deportivo Oficial</strong>
                <p>Preventa: $25 (Día del evento: $30)</p>
                <div style="margin-top:8px; display:flex; align-items:center; gap:8px;">
                    <input type="checkbox" id="addShort" onchange="actualizarPrecio()" style="width:18px; height:18px; margin:0; cursor:pointer;">
                    <label style="margin:0; font-size:0.75rem; color:white;">Añadir al registro</label>
                </div>
            </div>
        </div>

        <span class="section-label"><i class="fas fa-credit-card"></i> 4. Pago</span>
        <div class="pago-box">
            <span id="labelPrecio" class="price-tag">TOTAL: $25</span>
            <span id="tasaDisplay" style="color:var(--neon); font-size: 0.7rem;">Cargando tasa...</span>
            <div class="grid-form" style="margin-top:20px;">
                <div class="full-width input-group"><label>Método de Pago</label><i class="fas fa-wallet"></i><select id="metodo" onchange="mostrarInstrucciones()"><option value="Pago Móvil">Pago Móvil (Bs)</option><option value="Zelle">Zelle ($)</option></select></div>
                <div id="instrucciones" class="full-width" style="background:rgba(0,0,0,0.5); padding:10px; border-radius:8px; font-size:0.75rem; border-left:3px solid var(--neon); display:none; margin-bottom:10px;"></div>
                <div class="input-group"><label>Monto a transferir</label><i class="fas fa-money-bill"></i><input type="text" id="montoFinal" readonly></div>
                <div class="input-group"><label>Referencia</label><i class="fas fa-hashtag"></i><input type="text" id="referencia" required></div>
                <div class="full-width input-group"><label>Foto Carnet</label><input type="file" id="fotoCarnet" accept="image/*" required></div>
                <div class="full-width input-group"><label>Comprobante de Pago</label><input type="file" id="fotoPago" accept="image/*" required></div>
            </div>
        </div>
        <button type="submit" id="btnEnviar" class="btn-submit">Enviar Registro</button>
    </form>
    <div id="mensajeExito" style="display:none; text-align:center; padding:30px;"><i class="fas fa-check-circle" style="color:var(--neon); font-size:3rem;"></i><p>¡Registro enviado! Revisa tu correo.</p></div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyKOZQgueIrJ63Mfxp6Pz87dbVFgQmDgOjKcU990nOMqjuDphoM4UOvrKKkpbWQTwYp/exec";
    let TASA_BCV = 0;

    async function init() {
        const res = await fetch(WEB_APP_URL + "?getTasa=true");
        const data = await res.json();
        TASA_BCV = data.tasa;
        document.getElementById('tasaDisplay').innerText = "Tasa BCV: " + TASA_BCV + " Bs.";
        actualizarPrecio();
        mostrarInstrucciones();
    }

    function actualizarPrecio() {
        const mod = document.getElementById('modalidad').value;
        const cat = document.getElementById('categoria');
        const short = document.getElementById('addShort').checked;
        
        cat.innerHTML = mod.includes("Race") ? "<option>General</option>" : "<option>Escalado</option><option>Avanzado</option>";
        
        let totalUSD = mod.includes("Race") ? 25 : 30;
        if(short) totalUSD += 25;
        
        document.getElementById('labelPrecio').innerText = "TOTAL: $" + totalUSD;
        document.getElementById('montoFinal').value = (totalUSD * TASA_BCV).toFixed(2) + " Bs.";
    }

    function mostrarInstrucciones() {
        const m = document.getElementById('metodo').value;
        const div = document.getElementById('instrucciones');
        div.style.display = "block";
        div.innerHTML = m === "Zelle" ? "<strong>Zelle:</strong> Aquafontanella@gmail.com<br>Luis Javier Parra" : "<strong>Pago Móvil:</strong> Banesco (0134)<br>04148215396 | J-293740126";
    }

    async function toBase64(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
        });
    }

    document.getElementById('registroForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnEnviar');
        btn.disabled = true; btn.innerText = "PROCESANDO...";

        const data = {
            nombre: document.getElementById('nombre').value,
            apellido: document.getElementById('apellido').value,
            cedula: document.getElementById('cedula').value,
            fechaNac: document.getElementById('fechaNac').value,
            sexo: document.getElementById('sexo').value,
            telefono: document.getElementById('telefono').value,
            correo: document.getElementById('correo').value,
            box: document.getElementById('box').value,
            talla: document.getElementById('talla').value,
            modalidad: document.getElementById('modalidad').value,
            categoria: document.getElementById('categoria').value,
            compraShort: document.getElementById('addShort').checked ? "SI" : "NO",
            referencia: document.getElementById('referencia').value,
            montoBs: document.getElementById('montoFinal').value,
            fotoCarnet: await toBase64(document.getElementById('fotoCarnet').files[0]),
            fotoPago: await toBase64(document.getElementById('fotoPago').files[0])
        };

        await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
        document.getElementById('registroForm').style.display = 'none';
        document.getElementById('mensajeExito').style.display = 'block';
    };
    window.onload = init;
</script>
</body>
</html>
